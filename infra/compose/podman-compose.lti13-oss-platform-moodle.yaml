services:
  webserver:
    image: docker.io/moodlehq/moodle-php-apache:8.3
    depends_on:
      - db
    volumes:
      - ${MOODLE_DOCKER_WWWROOT}:/var/www/html:Z
    environment:
      MOODLE_DOCKER_RUNNING: "1"
      MOODLE_DOCKER_DBTYPE: "pgsql"
      MOODLE_DOCKER_DBNAME: "moodle"
      MOODLE_DOCKER_DBUSER: "moodle"
      MOODLE_DOCKER_DBPASS: "m@0dl3ing"
      MOODLE_DOCKER_WEB_HOST: "127.0.0.1"
      MOODLE_DOCKER_WEB_PORT: "15600"
    ports:
      - "127.0.0.1:15600:80"

  db:
    image: docker.io/library/postgres:17
    environment:
      POSTGRES_USER: "moodle"
      POSTGRES_PASSWORD: "m@0dl3ing"
      POSTGRES_DB: "moodle"
